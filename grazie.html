<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richiesta Inviata | Print3D4You</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            background: #f5f5f5;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #0a2540; /* Blu Navy Scuro */
        }

        header {
            background: #0a2540; /* Blu Navy Scuro */
            color: white;
            padding: 20px;
            border-bottom: 3px solid #007bff; /* Blu Elettrico */
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            /* Filtro opzionale per rendere l'emoji più coerente col blu, 
               ma la spunta verde classica ✅ è ottima per la conferma */
        }

        h1 {
            color: #0a2540;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p {
            color: #4a5a6a; /* Grigio-bluastro coerente */
            font-size: 1.1rem;
            max-width: 500px;
            margin: 5px 0;
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 35px;
            background: #007bff; /* Blu Elettrico */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
            transition: 0.2s;
        }

        .button:hover {
            background: #0069d9;
            transform: translateY(-2px);
        }

        footer {
            padding: 20px;
            background: #0a2540;
            color: white;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.2rem;">Print3D4You</div>
</header>

<div class="container">
    <div class="success-icon">✅</div>
    <h1>Richiesta inviata!</h1>
    <p>Grazie per aver inviato la tua richiesta di modello 3D.</p>
    <p>Analizzerò il file e ti risponderò con un preventivo il prima possibile.</p>
    
    <a href="index.html" class="button">Torna alla Home</a>
</div>

<footer>
    <p>© Print3D4You </p>
</footer>

</body>
</html>
